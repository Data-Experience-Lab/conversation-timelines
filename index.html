<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
    <title>ConversationPrototype.js</title>
    <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
  </head>
  <body>
    <div class="main">
      <div class="info-container">
        <div class="vis-level-container" style="touch-action: manipulation">
          <div
            id="text-container"
            style="
              flex-direction: column;
              display: flex;
              justify-content: center;
              overflow: visible
            "
          >
            <button class="top-informational-text" id="vis-level-text">Start Talking!</button>
            <button class="top-informational-text" id="startRecognition">
              Start recognition
            </button>
          </div>
          <div id="zoom" style="display: none; flex-direction: row; align-items: center;">
            <button class="top-informational-text" id="increase"> + </button>
            <button class="top-informational-text" id="decrease">-</button>
          </div>
          <button
            class="top-informational-text"
            id="jumpToCurrent"
            style="margin-left: 10vw; display: none"
          ></button>
          <label
            id="timeDetails"
            class="top-informational-text"
            style="margin-left: 1vw; display: none"
          >
          </label>
        </div>
      </div>
      <div id="clickable-area" style="width:100vw; height: 100vh">
        <div id="mainView" style="display: flex; flex-direction: row">
          <div
            id="topics"
            class="main-container fade"
            style="margin-bottom: 2vh"
          ></div>
        </div>
      </div>
    </div>

    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script type="module" src="js/script.js"></script>
  </body>
</html>
