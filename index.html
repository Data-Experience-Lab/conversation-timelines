<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
    <title>ConversationPrototype.js</title>
    <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
    <script src="https://d3js.org/d3.v4.js"></script>
    <script src="https://unpkg.com/d3-simple-slider"></script>
  </head>
  <body>
    <div class="main">
      <div class="info-container" style="margin-bottom: 20px">
        <div class="vis-level-container" style="touch-action: manipulation">
          <div
            id="text-container"git 
            style="
              flex-direction: column;
              display: flex;
              justify-content: center;
              overflow: visible
            "
          >
            <button class="top-informational-text" id="vis-level-text">Start Talking!</button>
            <button class="top-informational-text" id="startRecognition">
              Start recognition
            </button>
          </div>
          <div>
            <div id="speakersCheckbox" style="margin-top: 5px; display: none; align-items: center; height: 3vw;">
              <input type="checkbox" id="speakers" name="speakers" style="width: 20px; height: 20px;"/>
              <label for="singleSpeaker" style="color: white;">Single Speaker</label>
            </div>
            <div id="recordingCheckbox" style="margin-top: 0px; display: none; align-items: center; height: 3vw;">
              <input type="checkbox" id="recording" name="recording" style="width: 20px; height: 20px;"/>
              <label for="recording" style="color: white;">Stop Recording</label>
            </div>
          </div>
          <button
            class="top-informational-text"
            id="jumpToCurrent"
            style="margin-left: 1vw; display: none"
          ></button>
          <label
            id="timeDetails"
            class="top-informational-text"
            style="margin-left: 1vw; display: none"
          >
          </label>
        </div>
      </div>
      <div id="slider" style="width:90%; display:none""></div>
      <div id="clickable-area" style="width:100vw; height: 100vh">
        <div id="mainView" style="display: flex; flex-direction: row">
          <div
            id="topics"
            class="main-container fade"
            style="margin-bottom: 2vh; display: flex"
          ></div>
        </div>
      </div>
    </div>

    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
